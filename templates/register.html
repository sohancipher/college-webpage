
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-header">
        <div class="logo">
            <a href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="College Logo">
            </a>
        </div>
        <h1>Create Account</h1>
        <p>Register to access your dashboard</p>
    </div>

    <form class="login-form" action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-with-icon">
                <i class="fa fa-user"></i>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <div class="input-with-icon">
                <i class="fa fa-envelope"></i>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>
        </div>
        <div class="form-group">
            <label>Register as</label>
            <div class="role-selector">
                <label class="role-option"><input type="radio" name="role" value="student" checked> Student</label>
                <label class="role-option"><input type="radio" name="role" value="faculty"> Faculty</label>
            </div>
        </div>
        <button type="submit" class="login-btn">
            <i class="fa fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="footer-links">
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        <p>© 2026 College Management System</p>
    </div>
</div>
{% endblock %}
